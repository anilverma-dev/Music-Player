<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Profile</title>
  <link rel="stylesheet" href="profile.css">

  <!-- This link for fa fa icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css" integrity="sha512-DxV+EoADOkOygM4IR9yXP8Sb2qwgidEmeqAEmDKIOfPRQZOWbXCzLC6vjbZyy0vPisbH2SyW27+ddLVCN+OMzQ==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>

  <div id="page_cover">
    <div id="profile_box">
      <div id="profile_pic">
        <i class="fa-solid fa-user" id="profile_icon"></i>
      </div>

        <input type="file" accept="image/*" id="profile_upload"> 
        <p id="upp">Upload Profile pic</p>
        <h1 id="profile_name"></h1>
        <button id="next">Next <i class="fa-solid fa-angles-right"></i> </button>

    </div>
  </div>

  <!-- Main profile coding start -->

  <div id="main_profile_page">

    <div id="profile_header">
      <div id="profile_picture"></div>
    </div>
    <h1 id="profile_username">Krishna</h1>

    <div id="app">
      <a href="app/contact/contact.html">
      <div id="contact">
        <i class="fa-solid fa-address-book"></i>
        <p>Contact</p>
      </div>
      </a>
      <a href="app/player/player.html">
      <div id="player">
        <i class="fa-solid fa-circle-play"></i>
        <p>Player</p>
      </div>
      </a>
      <div id="logout">
        <i class="fa-solid fa-right-from-bracket"></i>
        <p id="logout_text">Log-out</p>
      </div>
    </div>
  </div>

  <div id="profile_futter">
    <p>Developed By :- Krishna</p>
  </div>


  <script src="profile JS/profile.js"></script>
</body>
</html>
