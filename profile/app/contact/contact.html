<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact list</title>
  <link rel="stylesheet" href="contact.css">

   <!-- This link for fa fa icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css" integrity="sha512-DxV+EoADOkOygM4IR9yXP8Sb2qwgidEmeqAEmDKIOfPRQZOWbXCzLC6vjbZyy0vPisbH2SyW27+ddLVCN+OMzQ==" crossorigin="anonymous" referrerpolicy="no-referrer" />

  <!-- This link is developed by "animated css" website -->

   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
  />
</head>
<body>
  
  <div id="profile_box">
    <div id="profile_pic"></div>
  </div>

  <i class="fa-solid fa-circle-plus" id="new_contact"></i>

  <div id="main_all_contact_box"> 
    <div id="contact_header">
      
      <h1> <i class="fa-solid fa-circle-user" id="user_icon"></i>All contact</h1>
      <input type="search" placeholder="Search your Contact Hare..." id="search" oninput="demo()">

    </div>

    <div id="all_contact_box">
    
    </div>

    

  </div>

  <!-- Add Cotact list coding start -->
  
  <div id="contact_bg" class="animate__animated animate__fadeIn" >
    <center>
      <div id="add_contact_box"class="animate__animated animate__slideInDown" >
     <h1 id="c_heading">Add New Contact</h1>
     <form>
      <span id="name_num_warning">
        <i class="fa-solid fa-triangle-exclamation"></i> Please enter Name and Contact No.</span>
      <input type="text" placeholder="Enter Name " id="c_name">
      <input type="number" placeholder="Enter Mobile No. " id="c_num">
      <button type="submit" id="add_btn">Add</button>
      <button type="button" id="close_btn">Close</button>
     </form>
    </div>
    </center>
  </div>



  <script src="contact.js"></script>
</body>
</html>
